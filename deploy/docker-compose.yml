services:
  client:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    container_name: dm-tools-client
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-8080}:80"
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: dm-tools-server
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_KEY: ${JWT_KEY:-change_me_before_deploying}
      JWT_KEY_EXPIRE: ${JWT_KEY_EXPIRE:-1h}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: ${MONGO_DATABASE:-dm_tools}
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-change_me}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: dm-tools-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-change_me}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "${MONGO_USERNAME:-admin}",
          "--password",
          "${MONGO_PASSWORD:-change_me}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongodb_data:
